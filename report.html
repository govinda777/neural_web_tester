    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 20px; }
        header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 30px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; padding: 15px; border-top: 5px solid #3498db; }
        .card.BUG { border-top-color: #e74c3c; background-color: #fff5f5; }
        .card.REVISITED { border-top-color: #f1c40f; }
        .card h3 { margin-top: 0; font-size: 1.1rem; color: #2c3e50; }
        .card .url { font-size: 0.85rem; color: #7f8c8d; word-break: break-all; margin-bottom: 10px; }
        .screenshot { width: 100%; border-radius: 4px; border: 1px solid #ddd; margin-bottom: 10px; cursor: zoom-in; }
        .logs, .errors { font-size: 0.75rem; background: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 4px; height: 100px; overflow-y: auto; margin-top: 5px; }
        .errors { background: #c0392b; }
        .label { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .label.SUCCESS { background-color: #2ecc71; color: white; }
        .label.BUG { background-color: #e74c3c; color: white; }
        .label.REVISITED { background-color: #f1c40f; color: #333; }

        .graph-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 40px; }
        .edge { font-size: 0.9rem; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
