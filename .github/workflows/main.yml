name: Neural Web Tester Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Perception Scan
      env:
        GITHUB_SHA: ${{ github.sha }}
      run: python agent_perception_scan.py

    - name: Upload Scan Report as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: perception-scan-report
        path: latest_scan_report.md

    - name: Commit and push report
      run: |
        mkdir -p reports
        cp latest_scan_report.md reports/latest_scan_report.md
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add reports/latest_scan_report.md
        git diff --quiet && git diff --staged --quiet || git commit -m "docs: update latest perception scan report"
        git push origin HEAD:${{ github.head_ref || github.ref_name }} || echo "Push failed or nothing to push"
